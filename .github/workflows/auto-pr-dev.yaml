name: Auto PR dev -> main
on:
  push:
    branches: [dev]
permissions:
  pull-requests: write
jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: gh pr create --base main --head dev --title "feat: atualizações automáticas" --body "PR criado automaticamente via workflow." --fill || echo "gh falhou (PR pode já existir)"
        env:
          GH_TOKEN: ${{ github.token }}
